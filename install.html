<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240,initial-scale=1.0,user-scalable=no">
<title>Install OpenCode Buddy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:240px;height:282px;overflow:hidden;background:#0a0a0a;font-family:monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
h1{font-size:12px;font-weight:700;letter-spacing:2px;color:#00FF41;margin-bottom:8px}
p{font-size:9px;color:rgba(0,255,65,0.5);margin-bottom:12px;line-height:1.5}
#qr{width:140px;height:140px;background:rgba(0,255,65,0.05);border:1px solid rgba(0,255,65,0.2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;color:rgba(0,255,65,0.3);margin-bottom:12px}
#qr canvas{display:block;width:140px;height:140px}
.footer{font-size:7px;color:rgba(0,255,65,0.15);margin-top:4px}
</style>
</head>
<body>
<h1>OPENCODE BUDDY</h1>
<p>Open on R1 from R1 Control:</p>
<p id="local-url" style="font-size:10px;color:#00FF41;word-break:break-all">http://192.168.178.86:9876/buddy/</p>
<p style="margin-top:4px;font-size:8px;color:rgba(0,255,65,0.3)">Or scan GitHub QR</p>
<div id="qr">
  <canvas id="qr-canvas" width="140" height="140"></canvas>
</div>
<div class="footer">v1.0 · same-origin for R1 · HTTPS for desktop</div>
<script>
// Try to detect R1 Control's IP from the current page
try {
  var parts = window.location.hostname.split(':')[0].split('.');
  if (parts.length === 4 && !isNaN(parts[0])) {
    document.getElementById('local-url').textContent = 'http://' + parts.join('.') + ':9876/buddy/';
  }
} catch(e){}
var qrData = JSON.stringify({
  title: "OpenCode Buddy",
  url: "https://aavirash.github.io/r1-buddy-opencode/",
  description: "Matrix-green buddy pet for your OpenCode CLI sessions",
  iconUrl: "",
  themeColor: "#00FF41"
});
document.getElementById('qr').innerHTML = '<p style="margin:auto;font-size:8px;color:rgba(0,255,65,0.3)">'+qrData+'</p>';
</script>
</body>
</html>
